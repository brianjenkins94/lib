{
  "name": "cd",
  "on": {
    "workflow_dispatch": null
  },
  "concurrency": {
    "group": "${{ github.workflow }}-${{ github.ref }}"
  },
  "permissions": {
    "contents": "read",
    "pages": "write",
    "id-token": "write"
  },
  "jobs": {
    "changes": {
      "runs-on": "ubuntu-latest",
      "steps": [
        { "uses": "actions/checkout@v4" },
        { "uses": "./.github/actions/detect-changes", "id": "changes" }
      ],
      "outputs": {
        "packages": "${{ steps.changes.outputs.packages }}"
      },
      "timeout-minutes": 15
    },
    "release": {
      "if": "needs.changes.outputs.packages != '' && needs.changes.outputs.packages != '[]'",
      "runs-on": "ubuntu-latest",
      "needs": ["changes"],
      "strategy": {
        "fail-fast": false,
        "matrix": {
          "package": "${{ fromJSON(needs.changes.outputs.packages) }}"
        }
      },
      "steps": [
        { "uses": "actions/checkout@v4" },
        { "uses": "actions/setup-node@v4", "with": { "node-version": "lts/*" } },
        { "uses": "pnpm/action-setup@v4", "with": { "version": "latest", "run_install": false } },
        {
          "uses": "actions/cache@v4",
          "with": {
            "path": "~/.pnpm-store",
            "key": "pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}",
            "restore-keys": "pnpm-store-${{ runner.os }}-"
          }
        },
        { "run": "pnpm config set --location=project --json allowBuilds \"{ \"esbuild\": true }\"" },
        { "run": "pnpm install" },
        {
          "working-directory": "${{ matrix.package }}",
          "run": "pnpm run --if-present build"
        },
        {
          "id": "tag",
          "env": {
            "GH_TOKEN": "${{ secrets.PAT }}"
          },
          "run": "echo \"TAG_NAME=$(.github/workflows/scripts/tag.sh \"${{ matrix.package }}\")\" >> \"$GITHUB_OUTPUT\""
        },
        {
          "uses": "softprops/action-gh-release@v2",
          "with": {
            "draft": true,
            "tag_name": "${{ steps.tag.outputs.TAG_NAME }}",
            "token": "${{ secrets.PAT }}"
          }
        }
      ],
      "timeout-minutes": 15
    },
    "publish": {
      "runs-on": "ubuntu-latest",
      "needs": ["changes", "release"],
      "steps": [
        { "uses": "actions/checkout@v4" },
        { "uses": "actions/setup-node@v4", "with": { "node-version": "lts/*" } },
        { "uses": "pnpm/action-setup@v4", "with": { "version": "latest", "run_install": false } },
        {
          "uses": "actions/cache@v4",
          "with": {
            "path": "~/.pnpm-store",
            "key": "pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}",
            "restore-keys": "pnpm-store-${{ runner.os }}-"
          }
        },
        {
          "env": {
            "GH_TOKEN": "${{ secrets.PAT }}"
          },
          "run": "(gh run download --name github-pages && tar -xvf artifact.tar --keep-old-files --directory docs/) || true"
        },
        { "run": "pnpm config set --location=project --json allowBuilds \"{ \"esbuild\": true }\"" },
        { "run": "pnpm install" },
        {
          "env": {
            "GH_TOKEN": "${{ secrets.PAT }}"
          },
          "run": ".github/workflows/scripts/publish.sh $(jq --raw-output '.[]' <<< '${{ needs.changes.outputs.packages }}')"
        },
        {
          "uses": "actions/upload-pages-artifact@v3",
          "with": {
            "path": "./docs"
          }
        }
      ],
      "timeout-minutes": 15
    },
    "deploy": {
      "runs-on": "ubuntu-latest",
      "environment": {
        "name": "github-pages",
        "url": "${{ steps.deployment.outputs.page_url }}"
      },
      "needs": ["publish"],
      "steps": [
        { "uses": "actions/deploy-pages@v4" }
      ],
      "timeout-minutes": 15
    },
    "smoke-test": {
      "runs-on": "ubuntu-latest",
      "needs": ["changes", "deploy"],
      "if": "needs.changes.outputs.packages != '' && needs.changes.outputs.packages != '[]'",
      "steps": [
        { "uses": "actions/checkout@v4" },
        { "uses": "actions/setup-node@v4", "with": { "node-version": "lts/*" } },
        { "uses": "pnpm/action-setup@v4", "with": { "version": "latest", "run_install": false } },
        { "run": "pnpm config set --location=project --json allowBuilds \"{ \"esbuild\": true }\"" },
        { "run": "pnpm install" },
        { "run": ".github/workflows/scripts/smoke.sh $(jq --raw-output '.[]' <<< '${{ needs.changes.outputs.packages }}')" }
      ],
      "timeout-minutes": 15
    }
  }
}
