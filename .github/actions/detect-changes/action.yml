{
  "name": "detect-changes",
  "description": "Enumerate workspace packages and report which changed since the last successful run.",
  "inputs": {
    "workflow": {
      "description": "Workflow file used to find the last successful run (the diff base).",
      "required": false,
      "default": "cd.yml"
    }
  },
  "outputs": {
    "packages": {
      "description": "JSON array of changed package directories.",
      "value": "${{ steps.filter.outputs.changes }}"
    }
  },
  "runs": {
    "using": "composite",
    "steps": [
      {
        "id": "enumerate",
        "shell": "bash",
        "run": "echo \"PACKAGES=$(git ls-files */package.json */*/package.json | jq --compact-output --raw-input --slurp 'split(\"\\n\")[:-1] | map(sub(\"/package.json$\"; \"\")) | reduce .[] as $key ({}; .[$key] = \"\\($key)/**\")')\" >> \"$GITHUB_OUTPUT\""
      },
      {
        "id": "base",
        "shell": "bash",
        "env": { "GH_TOKEN": "${{ github.token }}" },
        "run": "echo \"BASE_SHA=$(gh run list --workflow=${{ inputs.workflow }} --branch=main --json status,headSha,conclusion --jq '[.[] | select(.status == \"completed\" and .conclusion == \"success\")][0].headSha')\" >> \"$GITHUB_OUTPUT\""
      },
      {
        "if": "steps.enumerate.outputs.PACKAGES != '{}'",
        "uses": "dorny/paths-filter@v3",
        "id": "filter",
        "with": {
          "base": "${{ steps.base.outputs.BASE_SHA }}",
          "ref": "${{ github.sha }}",
          "filters": "${{ steps.enumerate.outputs.PACKAGES }}"
        }
      }
    ]
  }
}
